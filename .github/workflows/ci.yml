name: probes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: build & run additive-FFT probes (ubuntu-latest, gcc)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gcc
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends gcc libc6-dev

      - name: Print environment
        run: |
          echo "gcc:    $(gcc --version | head -1)"
          echo "runner: ${{ runner.os }}"

      - name: Build all probes
        working-directory: probes
        run: |
          set -euo pipefail
          for p in test_lch14_variants test_gf64_gao_mateer test_tower_fft_gf16; do
            echo "=== building $p ==="
            gcc -O2 -Wall -Wextra -Wpedantic -std=c99 "$p.c" -o "$p"
          done

      - name: Run LCH14/HQC addFFT probe
        working-directory: probes
        run: |
          set -euo pipefail
          echo "=== test_lch14_variants output ==="
          ./test_lch14_variants
          echo "=== end test_lch14_variants ==="
          # Forward-output match must be 100% at n=2 and n=4.
          ./test_lch14_variants | grep -F "n=2: 100% match rate = 100.00%" >/dev/null
          ./test_lch14_variants | grep -F "n=4: 100% match rate = 100.00%" >/dev/null
          # Convolution-theorem pass rate must be 100% at n=4.
          ./test_lch14_variants | grep -F "n=4 (57600 cases): pass rate = 100.00%" >/dev/null
          echo "OK: test_lch14_variants — 100% pass on forward-output and convolution probes."

      - name: Run third cross-check (HQC Alg 2 at affine shift v_3)
        working-directory: probes
        run: |
          set -euo pipefail
          echo "=== test_gf64_gao_mateer output ==="
          ./test_gf64_gao_mateer
          echo "=== end test_gf64_gao_mateer ==="
          ./test_gf64_gao_mateer | grep -F "n=2 match rate (16^4 cases): 100.00%" >/dev/null
          ./test_gf64_gao_mateer | grep -F "n=4 match rate (16^4 cases): 100.00%" >/dev/null
          ./test_gf64_gao_mateer | grep -F "n=4 length-2 free-sweep pass rate: 100.00% over 65536 cases" >/dev/null
          echo "OK: test_gf64_gao_mateer — 100% pass on all 4 cross-checks."

      - name: Run Tower addFFT verification probe
        working-directory: probes
        run: |
          set -euo pipefail
          cat "./test_tower_fft_gf16" >/dev/null   # fail loud if binary missing
          echo "=== test_tower_fft_gf16 output ==="
          ./test_tower_fft_gf16
          echo "=== end test_tower_fft_gf16 ==="
          # Independent cross-check at the third probe's affine shift.
          ./test_tower_fft_gf16 | grep -F "n=4 (57600 cases): pass rate = 100.00%" >/dev/null
          ./test_tower_fft_gf16 | grep -F "n=2: 100% match rate = 100.00%" >/dev/null
          ./test_tower_fft_gf16 | grep -F "n=4: 100% match rate = 100.00%" >/dev/null
          echo "OK: test_tower_fft_gf16 — 100% pass on forward-output and convolution probes."

      - name: Summary
        run: echo "All additive-FFT probes at GF(2^4) pass the convolution-theorem probe at 100%."
